@keyframes fairyFloat4{0%,100%{transform:translateY(0px)}50%{transform:translateY(-5px)}}

@keyframes sparkleAnim{0%,100%{opacity:.15;transform:scale(.55) rotate(0deg)}50%{opacity:1;transform:scale(1.45) rotate(45deg)}}

@keyframes celebIn{0%{opacity:0;transform:scale(.5) rotate(-5deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
.fairy-f{animation:fairyFloat 4s ease-in-out infinite}
.fairy-f2{animation:fairyFloat2 4.5s ease-in-out infinite}
.fairy-f3{animation:fairyFloat3 3.8s ease-in-out infinite}

.flutter-a{animation:flutter 3s ease-in-out infinite;transform-origin:center}
.sp{animation:sparkleAnim 2.8s ease-in-out infinite}
.wa-btn{animation:waPulse 2s ease-in-out infinite}
.celeb{animation:celebIn .55s cubic-bezier(.34,1.56,.64,1) forwards}
input{outline:none;font-family:'Cormorant Garamond',Georgia,serif}

const { useState, useEffect } = React;

const PALETTE = ["#e8a0b8","#c49b5f","#f4c4a8","#8fbc82","#d97082","#f0c858","#e8c8d8","#b888b0","#f9d8c0","#a8d4a0"];

function Confetti({ active }) {
  const [pieces, setPieces] = useState([]);
  useEffect(() => {
    if (!active) return;
    setPieces(Array.from({length:55},(_,i)=>({id:i,x:Math.random()*100,color:PALETTE[Math.floor(Math.random()*PALETTE.length)],size:Math.random()*9+5,delay:Math.random()*1.5,duration:Math.random()*2.5+2.5,shape:Math.random()>.5?"circle":"rect",rotate:Math.random()*360})));
    const t=setTimeout(()=>setPieces([]),5500);
    return()=>clearTimeout(t);
  },[active]);
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:"-20px",width:p.shape==="circle"?p.size:p.size*0.6,height:p.size,background:p.color,borderRadius:p.shape==="circle"?"50%":2,opacity:0,animation:`confettiFall ${p.duration}s ease-in ${p.delay}s forwards`,transform:`rotate(${p.rotate}deg)`}}/>
      ))}
    </div>
  );
}

function Countdown() {
  const target = new Date("2026-04-10T15:00:00");
  const calc = () => {
    const diff = target - new Date();
    if(diff<=0) return {d:0,h:0,m:0,s:0};
    return {d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)};
  };
  const [time,setTime]=useState(calc());
  const [bump,setBump]=useState(false);
  useEffect(()=>{const t=setInterval(()=>{setTime(calc());setBump(b=>!b)},1000);return()=>clearInterval(t);},[]);
  return (
    <div style={{display:"flex",gap:8,justifyContent:"center",margin:"10px 0 14px"}}>
      {[["Días",time.d],["Hrs",time.h],["Min",time.m],["Seg",time.s]].map(([label,val],i)=>(
        <div key={label} style={{background:"rgba(253,242,234,.92)",border:"1px solid rgba(196,155,95,.32)",borderRadius:10,padding:"9px 10px",minWidth:56,textAlign:"center",transition:"transform .12s",transform:i===3&&bump?"scale(1.07)":"scale(1)"}}>
          <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:24,color:"#b05468",fontWeight:700,lineHeight:1}}>{String(val).padStart(2,"0")}</div>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:9,color:"#c49b5f",letterSpacing:3,textTransform:"uppercase",marginTop:3}}>{label}</div>
        </div>
      ))}
    </div>
  );
}

}
