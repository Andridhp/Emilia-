<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Baby Shower de Emilia 🧚</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Playfair+Display:wght@400;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100%;overflow-x:hidden}
body{background:linear-gradient(145deg,#f5e6d8,#fdf0e8,#f5e0d5);min-height:100vh;font-family:Georgia,serif}

@keyframes confettiFall{0%{transform:translateY(0) rotate(0deg);opacity:1}100%{transform:translateY(110vh) rotate(720deg);opacity:0}}
@keyframes petalFall{0%{transform:translateY(-40px) rotate(0deg);opacity:0}10%{opacity:.6}90%{opacity:.35}100%{transform:translateY(110vh) rotate(560deg);opacity:0}}
@keyframes sparkleAnim{0%,100%{opacity:.15;transform:scale(.55) rotate(0deg)}50%{opacity:1;transform:scale(1.45) rotate(45deg)}}
@keyframes waPulse{0%,100%{transform:scale(1);box-shadow:0 4px 18px rgba(37,211,102,.3)}50%{transform:scale(1.04);box-shadow:0 6px 28px rgba(37,211,102,.55)}}
@keyframes celebIn{0%{opacity:0;transform:scale(.5) rotate(-5deg)}100%{opacity:1;transform:scale(1) rotate(0deg)}}
@keyframes flutter{0%,100%{transform:rotate(-7deg) scaleX(1)}50%{transform:rotate(7deg) scaleX(.8)}}

/* Freely floating fairies across screen */
@keyframes floatPath1{0%{transform:translate(0px,0px) rotate(0deg)}20%{transform:translate(60px,-80px) rotate(8deg)}40%{transform:translate(-40px,-140px) rotate(-5deg)}60%{transform:translate(80px,-200px) rotate(10deg)}80%{transform:translate(20px,-280px) rotate(-8deg)}100%{transform:translate(0px,-360px) rotate(0deg)}}
@keyframes floatPath2{0%{transform:translate(0px,0px) rotate(0deg)}25%{transform:translate(-70px,-90px) rotate(-10deg)}50%{transform:translate(50px,-180px) rotate(6deg)}75%{transform:translate(-30px,-270px) rotate(-8deg)}100%{transform:translate(0px,-360px) rotate(0deg)}}
@keyframes floatPath3{0%{transform:translate(0px,0px) rotate(0deg)}30%{transform:translate(90px,-70px) rotate(12deg)}60%{transform:translate(-50px,-160px) rotate(-9deg)}100%{transform:translate(0px,-360px) rotate(0deg)}}
@keyframes floatPath4{0%{transform:translate(0px,0px) rotate(0deg)}20%{transform:translate(-80px,-60px) rotate(-6deg)}50%{transform:translate(40px,-150px) rotate(9deg)}80%{transform:translate(-60px,-250px) rotate(-7deg)}100%{transform:translate(0px,-360px) rotate(0deg)}}
@keyframes floatPath5{0%{transform:translate(0px,0px) rotate(0deg)}35%{transform:translate(70px,-100px) rotate(8deg)}70%{transform:translate(-40px,-220px) rotate(-11deg)}100%{transform:translate(0px,-360px) rotate(0deg)}}
@keyframes wingFlap{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.75)}}
@keyframes wingFlapR{0%,100%{transform:scaleX(1)}50%{transform:scaleX(.72)}}

.sp{animation:sparkleAnim 2.8s ease-in-out infinite}
.wa-btn{animation:waPulse 2s ease-in-out infinite}
.celeb{animation:celebIn .55s cubic-bezier(.34,1.56,.64,1) forwards}
.flutter-a{animation:flutter 3s ease-in-out infinite;transform-origin:center}

/* Floating fairy base */
.free-fairy{
  position:fixed;
  pointer-events:none;
  z-index:10;
  opacity:0;
  animation-timing-function:ease-in-out;
  animation-iteration-count:infinite;
  animation-fill-mode:both;
}
.free-fairy.visible{opacity:1}
.fairy-wing-l{transform-origin:right center;animation:wingFlap 0.9s ease-in-out infinite}
.fairy-wing-r{transform-origin:left center;animation:wingFlapR 0.9s ease-in-out .12s infinite}

input{outline:none;font-family:'Cormorant Garamond',Georgia,serif}
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PALETTE = ["#e8a0b8","#c49b5f","#f4c4a8","#8fbc82","#d97082","#f0c858","#e8c8d8","#b888b0","#f9d8c0","#a8d4a0"];

/* ── FREELY FLOATING FAIRIES (fixed position, roam entire screen) ── */
const FAIRY_DEFS = [
  { dress:"#f0c858", dressD:"#e8bc48", hair:"#6b3a2a", wing:"#f8e8d0", size:54 },
  { dress:"#e8a0b8", dressD:"#d97090", hair:"#e8c870", wing:"#f8e8f8", size:46 },
  { dress:"#c8a0c0", dressD:"#b888b0", hair:"#5a3020", wing:"#f0e8f8", size:50 },
  { dress:"#88c8a8", dressD:"#70b890", hair:"#c84848", wing:"#e8f4e8", size:48 },
  { dress:"#f0a858", dressD:"#e09040", hair:"#3a2010", wing:"#fef0d8", size:44 },
  { dress:"#f8f0e8", dressD:"#f0e8d8", hair:"#c8a078", wing:"#fff8f0", size:52 },
  { dress:"#e8a0b8", dressD:"#d97090", hair:"#6b3a2a", wing:"#f8e8f8", size:40 },
  { dress:"#b8d8f0", dressD:"#90b8e0", hair:"#e8c870", wing:"#e8f4f8", size:46 },
];

function FreeFairy({ def, startX, startY, pathIdx, duration, delay, flipX }) {
  const paths = ["floatPath1","floatPath2","floatPath3","floatPath4","floatPath5"];
  const path = paths[pathIdx % paths.length];
  const s = def.size;
  const sc = flipX ? -1 : 1;

  return (
    <div
      className="free-fairy visible"
      style={{
        left: startX,
        top: startY,
        animation: `${path} ${duration}s ease-in-out ${delay}s infinite`,
        transform: `scaleX(${sc})`,
      }}
    >
      <svg width={s*2.2} height={s*2.6} viewBox="0 0 80 96" xmlns="http://www.w3.org/2000/svg">
        {/* Wings */}
        <g className="fairy-wing-l">
          <ellipse cx="22" cy="40" rx="22" ry="13" fill={def.wing} opacity=".72" transform="rotate(-38,22,40)"/>
          <ellipse cx="22" cy="40" rx="15" ry="9" fill={def.wing} opacity=".5" transform="rotate(-38,22,40)"/>
        </g>
        <g className="fairy-wing-r" style={{transformOrigin:"58px 38px"}}>
          <ellipse cx="58" cy="38" rx="22" ry="13" fill={def.wing} opacity=".68" transform="rotate(34,58,38)"/>
          <ellipse cx="58" cy="38" rx="15" ry="9" fill={def.wing} opacity=".48" transform="rotate(34,58,38)"/>
        </g>
        {/* Body/dress */}
        <ellipse cx="40" cy="62" rx="12" ry="20" fill={def.dress} opacity=".92"/>
        <ellipse cx="40" cy="70" rx="17" ry="12" fill={def.dressD} opacity=".88"/>
        {/* Arms */}
        <ellipse cx="26" cy="56" rx="8" ry="3.5" fill="#f4cba8" opacity=".8" transform="rotate(-36,26,56)"/>
        <ellipse cx="54" cy="56" rx="8" ry="3.5" fill="#f4cba8" opacity=".8" transform="rotate(32,54,56)"/>
        {/* Head */}
        <circle cx="40" cy="34" r="13" fill="#f4cba8" opacity=".96"/>
        {/* Hair */}
        <ellipse cx="40" cy="26" rx="13" ry="9" fill={def.hair} opacity=".9"/>
        <ellipse cx="35" cy="30" rx="6" ry="12" fill={def.hair} opacity=".78" transform="rotate(-10,35,30)"/>
        <ellipse cx="45" cy="30" rx="5" ry="10" fill={def.hair} opacity=".72" transform="rotate(10,45,30)"/>
        {/* Crown flowers */}
        <circle cx="33" cy="22" r="2.5" fill="#e8a0a8" opacity=".9"/>
        <circle cx="40" cy="19" r="2.5" fill="#f4c4a8" opacity=".9"/>
        <circle cx="47" cy="22" r="2.5" fill="#e8a0a8" opacity=".9"/>
        {/* Legs */}
        <line x1="36" y1="81" x2="32" y2="93" stroke="#f4cba8" strokeWidth="2.5" strokeLinecap="round"/>
        <line x1="44" y1="81" x2="46" y2="93" stroke="#f4cba8" strokeWidth="2.5" strokeLinecap="round"/>
        {/* Fairy dust */}
        <circle cx="55" cy="65" r="2" fill="#c49b5f" opacity=".65"/>
        <circle cx="62" cy="72" r="1.4" fill="#c49b5f" opacity=".45"/>
        <circle cx="58" cy="76" r="1" fill="#c49b5f" opacity=".35"/>
      </svg>
    </div>
  );
}

/* ── CONFETTI ── */
function Confetti({ active }) {
  const [pieces, setPieces] = useState([]);
  useEffect(() => {
    if (!active) return;
    setPieces(Array.from({length:55},(_,i)=>({id:i,x:Math.random()*100,color:PALETTE[Math.floor(Math.random()*PALETTE.length)],size:Math.random()*9+5,delay:Math.random()*1.5,duration:Math.random()*2.5+2.5,shape:Math.random()>.5?"circle":"rect",rotate:Math.random()*360})));
    const t=setTimeout(()=>setPieces([]),5500);
    return()=>clearTimeout(t);
  },[active]);
  return (
    <div style={{position:"fixed",inset:0,pointerEvents:"none",zIndex:999,overflow:"hidden"}}>
      {pieces.map(p=>(
        <div key={p.id} style={{position:"absolute",left:`${p.x}%`,top:"-20px",width:p.shape==="circle"?p.size:p.size*0.6,height:p.size,background:p.color,borderRadius:p.shape==="circle"?"50%":2,opacity:0,animation:`confettiFall ${p.duration}s ease-in ${p.delay}s forwards`,transform:`rotate(${p.rotate}deg)`}}/>
      ))}
    </div>
  );
}

/* ── COUNTDOWN ── */
function Countdown() {
  const target = new Date("2026-04-18T15:00:00");
  const calc = () => {
    const diff = target - new Date();
    if(diff<=0) return {d:0,h:0,m:0,s:0};
    return {d:Math.floor(diff/86400000),h:Math.floor((diff%86400000)/3600000),m:Math.floor((diff%3600000)/60000),s:Math.floor((diff%60000)/1000)};
  };
  const [time,setTime]=useState(calc());
  const [bump,setBump]=useState(false);
  useEffect(()=>{const t=setInterval(()=>{setTime(calc());setBump(b=>!b)},1000);return()=>clearInterval(t);},[]);
  return (
    <div style={{display:"flex",gap:8,justifyContent:"center",margin:"10px 0 14px"}}>
      {[["Días",time.d],["Hrs",time.h],["Min",time.m],["Seg",time.s]].map(([label,val],i)=>(
        <div key={label} style={{background:"rgba(253,242,234,.92)",border:"1px solid rgba(196,155,95,.32)",borderRadius:10,padding:"9px 10px",minWidth:56,textAlign:"center",transition:"transform .12s",transform:i===3&&bump?"scale(1.07)":"scale(1)"}}>
          <div style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:24,color:"#b05468",fontWeight:700,lineHeight:1}}>{String(val).padStart(2,"0")}</div>
          <div style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:9,color:"#c49b5f",letterSpacing:3,textTransform:"uppercase",marginTop:3}}>{label}</div>
        </div>
      ))}
    </div>
  );
}

/* ── SVG helpers (used inside card) ── */
const Flower = ({x,y,r=14,c1="#e8a0b8",c2="#d07090",c3="#b85070"}) => (
  <g><circle cx={x} cy={y} r={r} fill={c1} opacity=".75"/><circle cx={x} cy={y} r={r*.55} fill={c2} opacity=".68"/><circle cx={x} cy={y} r={r*.28} fill={c3} opacity=".55"/></g>
);
const Mushroom = ({x,y,w=44}) => {
  const h=w*.9;
  return (<g transform={`translate(${x},${y})`}><ellipse cx={w/2} cy={h*.42} rx={w/2} ry={h*.24} fill="#d87060" opacity=".85"/><ellipse cx={w/2} cy={h*.34} rx={w/2} ry={h*.28} fill="#e07868" opacity=".92"/><rect x={w/2-6} y={h*.36} width="12" height={h*.6} rx="4" fill="#f5e8d8" opacity=".9"/><circle cx={w/2-10} cy={h*.28} r={w*.08} fill="white" opacity=".65"/><circle cx={w/2} cy={h*.22} r={w*.07} fill="white" opacity=".6"/><circle cx={w/2+9} cy={h*.27} r={w*.075} fill="white" opacity=".62"/></g>);
};
const Butterfly = ({x,y,c="#e8a0b8",delay="0s"}) => (
  <g className="flutter-a" style={{transformOrigin:`${x}px ${y}px`,animationDelay:delay}}>
    <ellipse cx={x-12} cy={y-4} rx="14" ry="9" fill={c} opacity=".65" transform={`rotate(-20,${x-12},${y-4})`}/>
    <ellipse cx={x+12} cy={y-3} rx="12" ry="8" fill={c} opacity=".6" transform={`rotate(20,${x+12},${y-3})`}/>
    <ellipse cx={x-11} cy={y+6} rx="9" ry="6" fill={c} opacity=".5" transform={`rotate(-15,${x-11},${y+6})`}/>
    <ellipse cx={x+11} cy={y+7} rx="8" ry="5" fill={c} opacity=".45" transform={`rotate(15,${x+11},${y+7})`}/>
    <line x1={x} y1={y-10} x2={x} y2={y+12} stroke="#8a4858" strokeWidth="1.5" opacity=".55" strokeLinecap="round"/>
  </g>
);

/* ══════════ MAIN APP ══════════ */
function App() {
  const [visible,setVisible]   = useState(false);
  const [confetti,setConfetti] = useState(false);
  const [step,setStep]         = useState("idle");
  const [name,setName]         = useState("");
  const [guests,setGuests]     = useState(1);
  const [hovCard,setHovCard]   = useState(null);
  const [mapHov,setMapHov]     = useState(false);
  const [petals,setPetals]     = useState([]);
  const [fairyPositions,setFairyPositions] = useState([]);

  useEffect(()=>{
    setTimeout(()=>setVisible(true),120);
    // scattered starting positions across full screen
    setFairyPositions(FAIRY_DEFS.map((_,i)=>({
      x: Math.random()*80+5, // % of vw
      y: Math.random()*70+15, // % of vh — start mid/bottom so they float up
      pathIdx: i,
      duration: 14 + Math.random()*10,
      delay: Math.random()*8,
      flip: Math.random()>.5,
    })));
    setPetals(Array.from({length:14},(_,i)=>({id:i,x:Math.random()*100,delay:Math.random()*12,dur:Math.random()*7+9,size:Math.random()*10+7,color:PALETTE[Math.floor(Math.random()*PALETTE.length)]})));
  },[]);

  const handleConfirm = () => {
    if (!name.trim()) return;
    const msg = encodeURIComponent(`🧚✨ ¡Hola! Confirmo mi asistencia al Baby Shower de Emilia.\n\n👤 Nombre: ${name}\n👥 Asistentes: ${guests}\n\n📅 Sábado 18 de Abril 2026 · 3:00 PM\n📍 Casa de la abuela, Ojocaliente, Zac.`);
    window.open(`https://wa.me/524949427916?text=${msg}`,"_blank");
    setConfetti(true);
    setStep("done");
    setTimeout(()=>setConfetti(false),5500);
  };

  const f=(d=0)=>({opacity:visible?1:0,transform:visible?"translateY(0)":"translateY(22px)",transition:`opacity 1s ease ${d}s, transform 1s ease ${d}s`});

  const details=[
    {icon:"📅",label:"Fecha",   value:"Sábado, 18 de Abril 2026",sub:null},
    {icon:"🕐",label:"Hora",    value:"3:00 PM",                  sub:null},
    {icon:"📍",label:"Lugar",   value:"Casa de la abuela",        sub:"Ojocaliente, Zacatecas"},
  ];

  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",padding:20,position:"relative",overflow:"hidden"}}>
      <Confetti active={confetti}/>

      {/* Falling petals */}
      {petals.map(p=>(
        <div key={p.id} style={{position:"fixed",left:`${p.x}%`,top:0,width:p.size,height:p.size,background:p.color,borderRadius:"50% 0 50% 0",opacity:0,pointerEvents:"none",zIndex:0,animation:`petalFall ${p.dur}s ease-in ${p.delay}s infinite`}}/>
      ))}

      {/* 🧚 FREE FLOATING FAIRIES across entire screen */}
      {fairyPositions.map((fp,i)=>(
        <FreeFairy
          key={i}
          def={FAIRY_DEFS[i]}
          startX={`${fp.x}vw`}
          startY={`${fp.y}vh`}
          pathIdx={fp.pathIdx}
          duration={fp.duration}
          delay={fp.delay}
          flipX={fp.flip}
        />
      ))}

      {/* CARD */}
      <div style={{width:480,maxWidth:"100%",background:"linear-gradient(160deg,#fdf6ee 0%,#fdf0e8 40%,#fef5f0 70%,#fdf6ee 100%)",borderRadius:8,position:"relative",overflow:"hidden",zIndex:20,boxShadow:"0 28px 80px rgba(180,120,100,.22),0 4px 28px rgba(180,120,100,.13)"}}>

        {/* Gold border */}
        <div style={{position:"absolute",inset:9,border:"1.5px solid rgba(196,155,95,.32)",borderRadius:4,pointerEvents:"none",zIndex:2}}/>

        {/* Sparkles on card */}
        {[[10,28],[80,19],[92,43],[5,57],[87,67],[16,77],[72,87],[47,49],[57,14],[38,93],[25,35],[65,22],[3,72],[95,55]].map(([l,t],i)=>(
          <div key={i} className="sp" style={{position:"absolute",left:`${l}%`,top:`${t}%`,width:7,height:7,zIndex:4,animationDelay:`${i*0.22}s`}}>
            <div style={{position:"absolute",width:7,height:1.5,background:"#c49b5f",top:"50%",left:0,transform:"translateY(-50%)",borderRadius:2}}/>
            <div style={{position:"absolute",width:1.5,height:7,background:"#c49b5f",left:"50%",top:0,transform:"translateX(-50%)",borderRadius:2}}/>
          </div>
        ))}

        {/* TOP DECORATION SVG */}
        <svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",display:"block",position:"relative",zIndex:3}}>
          <defs><radialGradient id="tg" cx="50%" cy="30%" r="65%"><stop offset="0%" stopColor="#fde9d8" stopOpacity=".7"/><stop offset="100%" stopColor="#fdf6ee" stopOpacity="0"/></radialGradient></defs>
          <rect width="480" height="160" fill="url(#tg)"/>
          {/* Left florals */}
          <ellipse cx="44" cy="120" rx="26" ry="9" fill="#7aab6e" opacity=".52" transform="rotate(-38,44,120)"/>
          <ellipse cx="22" cy="100" rx="20" ry="8" fill="#8fbc82" opacity=".48" transform="rotate(-52,22,100)"/>
          <Flower x={58} y={100} r={19} c1="#e8a0a8" c2="#d97082" c3="#c85a6e"/>
          <Flower x={26} y={80} r={12} c1="#f4c4a8" c2="#e8a87e"/>
          <Flower x={80} y={88} r={9} c1="#f9d8c0" c2="#f0b890"/>
          <Mushroom x={22} y={122} w={36}/>
          {/* Right florals */}
          <ellipse cx="436" cy="116" rx="26" ry="9" fill="#7aab6e" opacity=".52" transform="rotate(38,436,116)"/>
          <ellipse cx="458" cy="98" rx="20" ry="8" fill="#8fbc82" opacity=".48" transform="rotate(52,458,98)"/>
          <Flower x={422} y={96} r={19} c1="#e8a0a8" c2="#d97082" c3="#c85a6e"/>
          <Flower x={454} y={76} r={12} c1="#f4c4a8" c2="#e8a87e"/>
          <Flower x={400} y={84} r={9} c1="#f9d8c0" c2="#f0b890"/>
          {/* Top center foliage */}
          <ellipse cx="195" cy="14" rx="30" ry="12" fill="#7aab6e" opacity=".42" transform="rotate(-16,195,14)"/>
          <ellipse cx="240" cy="8" rx="28" ry="10" fill="#8fbc82" opacity=".4" transform="rotate(4,240,8)"/>
          <ellipse cx="284" cy="12" rx="26" ry="10" fill="#6e9e63" opacity=".4" transform="rotate(22,284,12)"/>
          <Flower x={206} y={18} r={10} c1="#f4c4a8" c2="#e8a87e"/>
          <Flower x={260} y={10} r={8} c1="#e8a0a8" c2="#d97082"/>
          <Flower x={316} y={18} r={7} c1="#f9d8c0" c2="#f0b890"/>
          {/* Butterflies */}
          <Butterfly x={370} y={36} c="#e8a0b8"/>
          <Butterfly x={124} y={50} c="#f4c4a8" delay="1.6s"/>
          <Butterfly x={430} y={88} c="#e8c8d8" delay="0.8s"/>
          {/* Gold dots */}
          {[[160,55],[175,36],[325,50],[140,85],[348,88],[244,46]].map(([x,y],i)=>(
            <circle key={i} cx={x} cy={y} r={i%3===0?2:1.4} fill="#c49b5f" opacity=".52"/>
          ))}
        </svg>

        {/* TEXT CONTENT */}
        <div style={{position:"relative",zIndex:5,textAlign:"center",padding:"0 30px"}}>
          <p style={{...f(0),fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:11,color:"#c49b5f",letterSpacing:5,textTransform:"uppercase",marginBottom:4}}>✦ &nbsp; T e &nbsp; I n v i t a m o s &nbsp; ✦</p>
          <p style={{...f(0.1),fontFamily:"'Cormorant Garamond',Georgia,serif",fontStyle:"italic",fontSize:16,color:"#b07d6a",letterSpacing:1,marginBottom:4}}>Al Baby Shower de</p>
          <div style={{...f(0.2),fontFamily:"'Great Vibes',cursive",fontSize:80,color:"#c8667a",lineHeight:1,textShadow:"1px 1px 0 rgba(255,255,255,.6)",marginBottom:2}}>Emilia</div>
          <p style={{...f(0.3),fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:11,color:"#c49b5f",letterSpacing:4,textTransform:"uppercase",margin:"6px 0 8px"}}>✧ &nbsp; una pequeña hada está en camino &nbsp; ✧</p>

          {/* Countdown */}
          <div style={f(0.38)}>
            <p style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:10,color:"#b07d6a",letterSpacing:4,textTransform:"uppercase",marginBottom:4}}>Faltan</p>
            <Countdown/>
          </div>

          {/* Divider */}
          <div style={{display:"flex",alignItems:"center",gap:10,margin:"10px auto 14px",width:"82%"}}>
            <div style={{flex:1,height:1,background:"linear-gradient(to right,transparent,rgba(196,155,95,.5),transparent)"}}/>
            <span style={{color:"#c49b5f",fontSize:14}}>🧚</span>
            <div style={{flex:1,height:1,background:"linear-gradient(to right,transparent,rgba(196,155,95,.5),transparent)"}}/>
          </div>

          {/* Detail cards */}
          <div style={{display:"flex",flexDirection:"column",gap:9,marginBottom:14,...f(0.46)}}>
            {details.map((d,i)=>(
              <div key={i} onMouseEnter={()=>setHovCard(i)} onMouseLeave={()=>setHovCard(null)}
                style={{display:"flex",alignItems:"center",gap:12,background:"rgba(253,242,234,.82)",border:"1px solid rgba(196,155,95,.22)",borderRadius:10,padding:"12px 16px",boxShadow:hovCard===i?"0 7px 22px rgba(180,100,100,.16)":"0 2px 8px rgba(180,100,100,.07)",transform:hovCard===i?"translateY(-2px) scale(1.015)":"translateY(0) scale(1)",transition:"all .22s ease",cursor:"default"}}>
                <span style={{fontSize:22,flexShrink:0}}>{d.icon}</span>
                <div style={{textAlign:"left"}}>
                  <span style={{display:"block",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:9,color:"#c49b5f",letterSpacing:4,textTransform:"uppercase",marginBottom:2}}>{d.label}</span>
                  <span style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:14,color:"#7a4a40",fontWeight:600}}>{d.value}</span>
                  {d.sub&&<span style={{display:"block",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:12,color:"#a06555",fontStyle:"italic"}}>{d.sub}</span>}
                </div>
              </div>
            ))}
          </div>

          {/* Map button */}
          <a href="https://maps.app.goo.gl/eeEK6DCwSfKaayZ97" target="_blank" rel="noopener noreferrer"
            onMouseEnter={()=>setMapHov(true)} onMouseLeave={()=>setMapHov(false)}
            style={{...f(0.56),display:"inline-flex",alignItems:"center",gap:8,background:"linear-gradient(135deg,#c8667a,#b05468)",color:"white",textDecoration:"none",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:12,letterSpacing:3,textTransform:"uppercase",padding:"11px 28px",borderRadius:30,marginBottom:14,transition:"transform .22s, box-shadow .22s",transform:mapHov?"translateY(-3px)":"translateY(0)",boxShadow:mapHov?"0 10px 28px rgba(180,80,100,.42)":"0 4px 16px rgba(180,80,100,.26)"}}>
            📍 &nbsp; Cómo llegar
          </a>

          <div style={{display:"flex",alignItems:"center",gap:10,margin:"0 auto 14px",width:"82%"}}>
            <div style={{flex:1,height:1,background:"linear-gradient(to right,transparent,rgba(196,155,95,.5),transparent)"}}/>
            <span style={{color:"#c49b5f",fontSize:13}}>🌸</span>
            <div style={{flex:1,height:1,background:"linear-gradient(to right,transparent,rgba(196,155,95,.5),transparent)"}}/>
          </div>

          {/* RSVP WhatsApp */}
          <div style={{...f(0.66),marginBottom:8}}>
            {step==="idle"&&(
              <div>
                <p style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:10,color:"#c49b5f",letterSpacing:4,textTransform:"uppercase",marginBottom:12}}>¿Vas a venir?</p>
                <button onClick={()=>setStep("form")} className="wa-btn" style={{display:"inline-flex",alignItems:"center",gap:10,background:"linear-gradient(135deg,#25d366,#128c7e)",color:"white",border:"none",cursor:"pointer",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:14,letterSpacing:3,textTransform:"uppercase",padding:"12px 32px",borderRadius:30}}>
                  <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.522 5.85L.057 23.928a.5.5 0 0 0 .611.611l6.087-1.465A11.955 11.955 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.92 0-3.72-.51-5.27-1.4l-.38-.22-3.93.95.96-3.84-.25-.4A9.956 9.956 0 0 1 2 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
                  Confirmar asistencia
                </button>
              </div>
            )}
            {step==="form"&&(
              <div style={{background:"rgba(253,242,234,.88)",border:"1px solid rgba(196,155,95,.25)",borderRadius:12,padding:"20px 18px",textAlign:"left"}}>
                <p style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:10,color:"#c49b5f",letterSpacing:4,textTransform:"uppercase",marginBottom:14,textAlign:"center"}}>Confirma tu asistencia</p>
                <label style={{display:"block",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:10,color:"#c49b5f",letterSpacing:3,textTransform:"uppercase",marginBottom:5}}>Tu nombre</label>
                <input type="text" value={name} onChange={e=>setName(e.target.value)} placeholder="Escribe tu nombre..." style={{width:"100%",padding:"10px 14px",borderRadius:8,border:"1.5px solid rgba(196,155,95,.4)",background:"rgba(255,252,248,.9)",fontSize:14,color:"#7a4a40",marginBottom:12,boxSizing:"border-box"}}/>
                <label style={{display:"block",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:10,color:"#c49b5f",letterSpacing:3,textTransform:"uppercase",marginBottom:5}}>¿Cuántos asistirán?</label>
                <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                  <button onClick={()=>setGuests(g=>Math.max(1,g-1))} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(196,155,95,.4)",background:"rgba(255,252,248,.9)",cursor:"pointer",fontSize:18,color:"#c8667a",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>−</button>
                  <span style={{fontFamily:"'Playfair Display',Georgia,serif",fontSize:22,color:"#7a4a40",fontWeight:600,minWidth:28,textAlign:"center"}}>{guests}</span>
                  <button onClick={()=>setGuests(g=>Math.min(10,g+1))} style={{width:32,height:32,borderRadius:"50%",border:"1.5px solid rgba(196,155,95,.4)",background:"rgba(255,252,248,.9)",cursor:"pointer",fontSize:18,color:"#c8667a",fontWeight:700,display:"flex",alignItems:"center",justifyContent:"center"}}>+</button>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setStep("idle")} style={{flex:1,padding:"10px",borderRadius:30,border:"1.5px solid rgba(196,155,95,.4)",background:"transparent",cursor:"pointer",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:12,color:"#a06555",letterSpacing:2}}>Cancelar</button>
                  <button onClick={handleConfirm} style={{flex:2,padding:"11px",borderRadius:30,border:"none",cursor:name.trim()?"pointer":"not-allowed",background:name.trim()?"linear-gradient(135deg,#25d366,#128c7e)":"#ccc",color:"white",fontFamily:"'Cormorant Garamond',Georgia,serif",fontSize:13,letterSpacing:2,display:"flex",alignItems:"center",justifyContent:"center",gap:7,transition:"background .2s"}}>
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="white"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.123.554 4.118 1.522 5.85L.057 23.928a.5.5 0 0 0 .611.611l6.087-1.465A11.955 11.955 0 0 0 12 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.92 0-3.72-.51-5.27-1.4l-.38-.22-3.93.95.96-3.84-.25-.4A9.956 9.956 0 0 1 2 12C2 6.486 6.486 2 12 2s10 4.486 10 10-4.486 10-10 10z"/></svg>
                    Enviar por WhatsApp
                  </button>
                </div>
              </div>
            )}
            {step==="done"&&(
              <div className="celeb" style={{paddingBottom:6}}>
                <div style={{fontSize:48,marginBottom:4}}>🧚✨</div>
                <p style={{fontFamily:"'Great Vibes',cursive",fontSize:48,color:"#c8667a",lineHeight:1.1,marginBottom:6}}>¡Te esperamos!</p>
                <p style={{fontFamily:"'Cormorant Garamond',Georgia,serif",fontStyle:"italic",color:"#a06555",fontSize:14}}>Gracias {name}, será un día mágico 🌸</p>
              </div>
            )}
          </div>
        </div>

        {/* BOTTOM DECORATION SVG */}
        <svg viewBox="0 0 480 160" xmlns="http://www.w3.org/2000/svg" style={{width:"100%",display:"block",position:"relative",zIndex:3,marginTop:10}}>
          <defs><radialGradient id="bg2" cx="50%" cy="80%" r="60%"><stop offset="0%" stopColor="#fde9d8" stopOpacity=".45"/><stop offset="100%" stopColor="#fdf6ee" stopOpacity="0"/></radialGradient></defs>
          <rect width="480" height="160" fill="url(#bg2)"/>
          <Mushroom x={182} y={28} w={56}/><Mushroom x={112} y={72} w={40}/><Mushroom x={300} y={70} w={38}/>
          <Mushroom x={50} y={100} w={30}/><Mushroom x={360} y={96} w={28}/>
          <Flower x={50} y={130} r={15} c1="#e8a0b8" c2="#d07090" c3="#b85070"/>
          <Flower x={100} y={118} r={11} c1="#f4c4a8" c2="#e8a87e"/>
          <Flower x={390} y={126} r={15} c1="#e8c8d8" c2="#d4a0b8" c3="#b878a8"/>
          <Flower x={440} y={114} r={10} c1="#f4c4a8" c2="#e8a87e"/>
          <Flower x={16} y={106} r={12} c1="#f4c4a8" c2="#e8a878"/>
          <Flower x={462} y={102} r={11} c1="#e8a0a8" c2="#d97082"/>
          <ellipse cx="38" cy="148" rx="20" ry="7" fill="#7aab6e" opacity=".5" transform="rotate(-22,38,148)"/>
          <ellipse cx="442" cy="144" rx="18" ry="7" fill="#7aab6e" opacity=".5" transform="rotate(18,442,144)"/>
          <Butterfly x={240} y={22} c="#f4c4a8" delay="2s"/>
          <Butterfly x={150} y={14} c="#e8a0b8" delay="0.4s"/>
          <Butterfly x={340} y={16} c="#e8c8d8" delay="1.2s"/>
          {/* frog */}
          <ellipse cx="216" cy="128" rx="10" ry="7" fill="#7ab860" opacity=".72"/>
          <circle cx="212" cy="122" r="4.5" fill="#8acc70" opacity=".78"/>
          <circle cx="220" cy="122" r="4.5" fill="#8acc70" opacity=".78"/>
          <circle cx="212" cy="121" r="2" fill="#2a5820" opacity=".6"/><circle cx="220" cy="121" r="2" fill="#2a5820" opacity=".6"/>
          {/* snail */}
          <ellipse cx="252" cy="132" rx="10" ry="6" fill="#c8986a" opacity=".72"/>
          <path d="M248,130 Q252,121 259,126 Q255,132 248,130" fill="#b87848" opacity=".65"/>
          {[[190,78],[265,72],[334,86],[128,84],[88,74],[392,72],[240,50]].map(([x,y],i)=>(
            <circle key={i} cx={x} cy={y} r={1.5} fill="#c49b5f" opacity=".48"/>
          ))}
          <text x="240" y="150" textAnchor="middle" fontFamily="'Cormorant Garamond',Georgia,serif" fontStyle="italic" fontSize="11" fill="#c49b5f" opacity=".65" letterSpacing="2">con amor 🌸</text>
        </svg>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
